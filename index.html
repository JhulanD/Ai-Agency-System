<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Client Acquisition System</title>
    <meta name="description" content="Get 5–10 Qualified Clients Every Month Using This AI Outreach System. Stop guessing and start closing." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Client Acquisition System for Agencies" />
    <meta property="og:description" content="Automate your outreach and book more calls with our proven AI system." />
    <meta property="og:image" content="https://picsum.photos/seed/agency-growth/1200/630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="AI Client Acquisition System for Agencies" />
    <meta property="twitter:description" content="Automate your outreach and book more calls with our proven AI system." />
    <meta property="twitter:image" content="https://picsum.photos/seed/agency-growth/1200/630" />

    <!-- Google Analytics (optional - remove if not using) -->
    <script>
      // Only load GA if ID is configured
      if (import.meta.env.VITE_GA_ID) {
        const script = document.createElement('script');
        script.src = `https://www.googletagmanager.com/gtag/js?id=${import.meta.env.VITE_GA_ID}`;
        script.async = true;
        document.head.appendChild(script);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', import.meta.env.VITE_GA_ID);
      }
    </script>

    <!-- Lemon Squeezy Overlay -->
    <script src="https://app.lemonsqueezy.com/js/lemon.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
